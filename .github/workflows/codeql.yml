name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package*.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package*.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true
permissions: read-all

jobs:
  analyze:
    name: Analyze (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      # --- AI DETECTION & GAUNTLET (Runs only for AI) ---
      
      - name: Detect AI PRs
        id: ai-detect
        shell: bash
        run: |
          IS_AI="false"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if echo "${{ github.event.pull_request.title }} ${{ github.event.pull_request.body }} ${{ github.actor }}" | grep -qiE '(jules|claude|agent|ai-bot|gemini|openai|codex|kilo|kilo\.ai)'; then
              IS_AI="true"
            fi
          fi
          echo "is_ai=$IS_AI" >> $GITHUB_OUTPUT

      - name: 🏷️ Apply AI Label
        if: steps.ai-detect.outputs.is_ai == 'true'
        env:
          GH_TOKEN: 
        run: |
          gh pr edit  --add-label "ai-detect" || true

      # --- THE GATE (Approach 1 Toggle) ---
      - name: ðŸ›‘ AI Gate - Require Human Verification
        if: steps.ai-detect.outputs.is_ai == 'true' && !contains(github.event.pull_request.labels.*.name, 'human-verified')
        run: |
          echo "::error::AI PR detected. This repository requires the 'human-verified' label to merge AI code."
          exit 1

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: github/codeql-action/init@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        with:
          languages: javascript
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: npm run build
      - uses: github/codeql-action/analyze@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        with:
          category: /language:javascript

