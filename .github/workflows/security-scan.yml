name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package*.json'
      - 'tsconfig.json'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package*.json'
      - 'tsconfig.json'
      - '.github/workflows/security-scan.yml'
  schedule:
    - cron: '0 4 * * 1'

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true
permissions: read-all

jobs:
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      # --- AI DETECTION & GAUNTLET (Runs only for AI) ---
      
      - name: Detect AI PRs
        id: ai-detect
        shell: bash
        run: |
          IS_AI="false"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if echo "${{ github.event.pull_request.title }} ${{ github.event.pull_request.body }} ${{ github.actor }}" | grep -qiE '(jules|claude|agent|ai-bot|gemini|openai|codex|kilo|kilo\.ai)'; then
              IS_AI="true"
            fi
          fi
          echo "is_ai=$IS_AI" >> $GITHUB_OUTPUT

      - name: 🏷️ Apply AI Label
        if: steps.ai-detect.outputs.is_ai == 'true'
        env:
          GH_TOKEN: 
        run: |
          gh pr edit  --add-label "ai-detect" || true

      # --- THE GATE (Approach 1 Toggle) ---
      - name: ðŸ›‘ AI Gate - Require Human Verification
        if: steps.ai-detect.outputs.is_ai == 'true' && !contains(github.event.pull_request.labels.*.name, 'human-verified')
        run: |
          echo "::error::AI PR detected. This repository requires the 'human-verified' label to merge AI code."
          exit 1

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy
          trivy --version

      - name: Scan repository
        run: |
          trivy fs \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0 \
            .

      - name: Upload Trivy SARIF to Security tab
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

